<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO & Open Graph -->
    <title>Bar do Kblo - Tributo Oficial</title>
    <meta name="description" content="Homenagem oficial ao lendário Bar do Kblo. Relembre histórias, fotos e momentos que marcaram gerações.">
    <meta property="og:title" content="Bar do Kblo - Tributo Oficial">
    <meta property="og:description" content="Um lugar que eternizou memórias. Confira as fotos e depoimentos da nossa comunidade.">
    <meta property="og:image" content="kblo.jpg">
    <meta property="og:type" content="website">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; overflow-x: hidden; background: #07070a; color: #fff; font-family: 'Montserrat', sans-serif; line-height: 1.6; touch-action: manipulation; }

        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 20%, rgba(102, 126, 234, 0.1) 0%, #07070a 100%); z-index: -2; }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .navbar { position: fixed; top: 0; width: 100%; padding: 15px 40px; background: rgba(7, 7, 10, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #8a9eff, #a17fe0); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
        .nav-links a { color: rgba(255, 255, 255, 0.7); text-decoration: none; font-weight: 600; font-size: 0.8rem; margin-left: 25px; transition: 0.3s; }
        .nav-links a:hover { color: #8a9eff; }

        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 120px 24px 60px; }
        .kblo-foto { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 3px solid #8a9eff; box-shadow: 0 0 40px rgba(138,158,255,0.3); margin-bottom: 20px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3.8rem; line-height: 1.1; margin-bottom: 30px; background: linear-gradient(135deg, #fff, #8a9eff); -webkit-background-clip: text; background-clip: text; color: transparent; }

        /* Player Minimalista */
        .player-box { max-width: 450px; margin: 0 auto 25px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 40px; padding: 10px 20px; display: flex; align-items: center; gap: 15px; }
        .play-btn { background: #8a9eff; color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .play-btn:hover { transform: scale(1.1); }
        .slider { flex-grow: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); outline: none; cursor: pointer; }
        
        .volume-wrap { display: flex; align-items: center; position: relative; }
        .vol-slider { width: 0; opacity: 0; -webkit-appearance: none; height: 4px; background: #8a9eff; border-radius: 2px; transition: 0.3s; }
        .volume-wrap:hover .vol-slider, .volume-wrap.active .vol-slider { width: 70px; opacity: 1; margin-left: 10px; }

        .share-btn { width: 40px; height: 40px; border-radius: 50%; border: none; color: #fff; margin: 0 5px; cursor: pointer; transition: 0.3s; font-size: 18px; }
        .share-fb { background: #1877F2; } .share-wa { background: #25D366; } .share-tw { background: #1DA1F2; }

        .section { padding: 80px 24px; max-width: 800px; margin: 0 auto; opacity: 0; transform: translateY(20px); transition: 0.6s ease; }
        .section.visible { opacity: 1; transform: translateY(0); }
        .section-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; text-align: center; margin-bottom: 40px; color: #8a9eff; }

        .card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 30px; margin-bottom: 40px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: rgba(255,255,255,0.6); font-weight: 600; }
        input, textarea { width: 100%; padding: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-family: inherit; }
        
        .file-btn { display: block; padding: 12px; border: 2px dashed rgba(138, 158, 255, 0.3); border-radius: 10px; text-align: center; color: #8a9eff; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .btn-send { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 30px; color: #fff; font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* Listas Limpas com Scroll */
        .list-wrap { max-height: 500px; overflow-y: auto; padding-right: 10px; margin-top: 30px; }
        .list-wrap::-webkit-scrollbar { width: 3px; }
        .list-wrap::-webkit-scrollbar-thumb { background: rgba(138, 158, 255, 0.2); }

        .item-msg { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 15px; position: relative; }
        .item-foto { border-radius: 15px; overflow: hidden; margin-bottom: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .item-foto img { width: 100%; height: 200px; object-fit: cover; }

        .btn-del { position: absolute; top: 10px; right: 10px; background: rgba(217,83,79,0.8); border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; opacity: 0; transition: 0.3s; }
        .item-msg:hover .btn-del, .item-foto:hover .btn-del { opacity: 1; }

        /* Modal com Zoom */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out; }
        .modal.active { display: flex; }
        .modal img { max-width: 90%; max-height: 90vh; border-radius: 10px; transition: 0.3s; cursor: zoom-in; }
        .modal img.zoomed { transform: scale(1.5); cursor: zoom-out; }

        @media (max-width: 768px) {
            .navbar { padding: 15px 20px; }
            .hero h1 { font-size: 2.5rem; }
            .section-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>

    <nav class="navbar">
        <div class="logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">BAR DO <span>KBLO</span></div>
        <div class="nav-links">
            <a href="#sobre">HISTÓRIA</a>
            <a href="#mural">MURAL</a>
            <span style="cursor:pointer; font-size:0.7rem; opacity:0.3; margin-left:20px;" onclick="promptAdmin()">Painel</span>
        </div>
    </nav>

    <div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
        <img id="modalImg" onclick="event.stopPropagation(); this.classList.toggle('zoomed')">
    </div>

    <section class="hero">
        <div class="hero-content">
            <img src="kblo.jpg" class="kblo-foto" onerror="this.style.display='none'">
            <h1>TRIBUTO AO<br>BAR DO KBLO</h1>
            
            <div class="player-box">
                <button class="play-btn" onclick="toggleAudio()" id="playBtn"><i class="fas fa-play"></i></button>
                <input type="range" class="slider" id="audioSlider" value="0" oninput="seekAudio()">
                <div class="volume-wrap" id="volWrap">
                    <i class="fas fa-volume-up" style="cursor:pointer" onclick="handleVolClick()"></i>
                    <input type="range" class="vol-slider" id="volSlider" value="80" oninput="setVol()">
                </div>
                <audio id="audio" src="musica.mp3"></audio>
            </div>

            <p style="font-size:0.9rem; color:rgba(255,255,255,0.6); margin-bottom:20px;">
                Ouvida <span id="plays" style="color:#8a9eff; font-weight:700;">0</span> vezes
            </p>

            <div class="share-box">
                <button class="share-btn share-fb" onclick="shareFB()"><i class="fab fa-facebook-f"></i></button>
                <button class="share-btn share-wa" onclick="shareWA()"><i class="fab fa-whatsapp"></i></button>
                <button class="share-btn share-tw" onclick="shareTW()"><i class="fab fa-twitter"></i></button>
            </div>
        </div>
    </section>

    <section id="sobre" class="section">
        <h2 class="section-title">Nossa História</h2>
        <div class="card" style="text-align:center">
            <img src="bar.jpg" style="max-width:100%; border-radius:15px; margin-bottom:20px;" onerror="this.style.display='none'">
            <p style="color:rgba(255,255,255,0.8)">O Bar do Kblo não era apenas um estabelecimento, era o coração da nossa comunidade.</p>
        </div>
    </section>

    <section id="mural" class="section">
        <h2 class="section-title">Mural de Memórias</h2>
        
        <!-- Mensagens -->
        <div class="card">
            <h3 style="margin-bottom:20px; font-size:1.1rem">Deixe sua Mensagem</h3>
            <div class="input-group">
                <label>Nome</label>
                <input type="text" id="msgNome" placeholder="Seu nome">
            </div>
            <div class="input-group">
                <label>Mensagem</label>
                <textarea id="msgTexto" rows="3" placeholder="Sua história..."></textarea>
            </div>
            <button class="btn-send" onclick="sendMsg()" id="btnMsg">POSTAR</button>
            
            <div class="list-wrap" id="listMsg"></div>
        </div>

        <!-- Fotos -->
        <div class="card">
            <h3 style="margin-bottom:20px; font-size:1.1rem">Compartilhe uma Foto</h3>
            <div class="input-group">
                <label>Nome</label>
                <input type="text" id="fotoNome" placeholder="Seu nome">
            </div>
            <div class="input-group">
                <label>Foto</label>
                <label class="file-btn" id="fileLbl"><i class="fas fa-upload"></i> Escolher Arquivo</label>
                <input type="file" id="fotoFile" style="display:none" onchange="document.getElementById('fileLbl').textContent=this.files[0].name">
            </div>
            <button class="btn-send" onclick="sendFoto()" id="btnFoto">ENVIAR FOTO</button>
            
            <div class="list-wrap" id="listFoto" style="display:grid; grid-template-columns:1fr 1fr; gap:15px"></div>
        </div>
    </section>

    <footer style="text-align:center; padding:40px; opacity:0.3; font-size:0.8rem">
        © 2026 Tributo ao Bar do Kblo
    </footer>

    <script>
        const CONFIG = {
            URL: 'https://dvpdypkfybnabaofcdse.supabase.co',
            KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2cGR5cGtmeWJuYWJhb2ZjZHNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzQyMjYsImV4cCI6MjA5Njg1MDIyNn0.NLOwSbfxvUOepNj5FUEjgBCoGYDgX5kfg44PZDuHXFY'
        };
        const sb = supabase.createClient(CONFIG.URL, CONFIG.KEY);
        let isAdmin = false;
        const audio = document.getElementById('audio');

        const clean = (s) => { const t = document.createElement('div'); t.textContent = s; return t.innerHTML; };

        // Audio
        audio.addEventListener('timeupdate', () => {
            const s = document.getElementById('audioSlider');
            if(!s.seeking) s.value = (audio.currentTime / audio.duration) * 100 || 0;
        });
        async function toggleAudio() {
            const b = document.getElementById('playBtn');
            if(audio.paused) { await audio.play(); b.innerHTML='<i class="fas fa-pause"></i>'; incPlays(); }
            else { audio.pause(); b.innerHTML='<i class="fas fa-play"></i>'; }
        }
        function seekAudio() { audio.currentTime = (document.getElementById('audioSlider').value / 100) * audio.duration; }
        function setVol() { audio.volume = document.getElementById('volSlider').value / 100; }
        function handleVolClick() { if(window.innerWidth <= 768) document.getElementById('volWrap').classList.toggle('active'); else audio.volume = audio.volume > 0 ? 0 : 0.8; }

        async function incPlays() {
            const {data} = await sb.from('metricas').select('valor').eq('chave','reproducoes_musica').single();
            const n = (data?.valor || 0) + 1;
            await sb.from('metricas').upsert({chave:'reproducoes_musica', valor:n});
            document.getElementById('plays').textContent = n.toLocaleString();
        }

        // Mural
        async function loadMsgs() {
            const {data} = await sb.from('depoimentos').select('*').order('criado_em',{ascending:false}).limit(5);
            document.getElementById('listMsg').innerHTML = data.map(d => `
                <div class="item-msg">
                    <div style="color:#8a9eff; font-weight:700; font-size:0.85rem">${clean(d.nome)}</div>
                    <div style="margin-top:8px; font-size:0.9rem">${clean(d.depoimento)}</div>
                    ${isAdmin ? `<button class="btn-del" onclick="delMsg(${d.id})"><i class="fas fa-trash"></i></button>` : ''}
                </div>
            `).join('');
        }

        async function sendMsg() {
            const n = document.getElementById('msgNome').value.trim();
            const t = document.getElementById('msgTexto').value.trim();
            if(!n || !t) return alert("Preencha tudo");
            document.getElementById('btnMsg').disabled = true;
            await sb.from('depoimentos').insert([{nome:n, depoimento:t, aprovado:true}]);
            document.getElementById('msgNome').value=''; document.getElementById('msgTexto').value='';
            loadMsgs(); document.getElementById('btnMsg').disabled = false;
        }

        async function loadFotos() {
            const {data} = await sb.from('fotos').select('*').order('criado_em',{ascending:false}).limit(5);
            document.getElementById('listFoto').innerHTML = data.map(f => `
                <div class="item-foto" onclick="openModal('${f.foto_url}')">
                    <img src="${f.foto_url}?width=400&quality=70" loading="lazy">
                    ${isAdmin ? `<button class="btn-del" onclick="event.stopPropagation(); delFoto(${f.id})"><i class="fas fa-trash"></i></button>` : ''}
                </div>
            `).join('');
        }

        async function sendFoto() {
            const n = document.getElementById('fotoNome').value.trim();
            const f = document.getElementById('fotoFile').files[0];
            if(!n || !f) return alert("Preencha tudo");
            document.getElementById('btnFoto').disabled = true;
            const path = `${Date.now()}.${f.name.split('.').pop()}`;
            const {error} = await sb.storage.from('fotos').upload(path, f);
            if(!error) {
                const {data} = sb.storage.from('fotos').getPublicUrl(path);
                await sb.from('fotos').insert([{nome:n, user_email:n, foto_url:data.publicUrl, aprovado:true}]);
                document.getElementById('fotoNome').value=''; document.getElementById('fotoFile').value='';
                document.getElementById('fileLbl').textContent='Escolher Arquivo';
                loadFotos();
            }
            document.getElementById('btnFoto').disabled = false;
        }

        function openModal(u) {
            const m = document.getElementById('modal');
            const i = document.getElementById('modalImg');
            i.src = u; i.classList.remove('zoomed');
            m.style.display = 'flex'; document.body.style.overflow = 'hidden';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        function shareFB() { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}`,'_blank'); }
        function shareWA() { window.open(`https://wa.me/?text=${encodeURIComponent('Bar do Kblo: '+location.href)}`,'_blank'); }
        function shareTW() { window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(location.href)}`,'_blank'); }

        function promptAdmin() {
            if(prompt("E-mail:") === 'tributokblo@gmail.com' && prompt("Senha:") === 'b@nc4da18') {
                isAdmin = true; alert("Modo Admin"); loadMsgs(); loadFotos();
            }
        }

        window.onload = () => {
            sb.from('metricas').select('valor').eq('chave','reproducoes_musica').single().then(({data}) => {
                if(data) document.getElementById('plays').textContent = data.valor.toLocaleString();
            });
            loadMsgs(); loadFotos();
            const obs = new IntersectionObserver(es => es.forEach(e => e.isIntersecting && e.target.classList.add('visible')), {threshold:0.1});
            document.querySelectorAll('.section').forEach(s => obs.observe(s));
        };
    </script>
</body>
</html>
